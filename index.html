<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Statique Exemple</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #0078d7;
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        footer {
            text-align: center;
            color: #888;
            padding: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenue sur mon projet CI/CD </h1>
        <p>Deploiement reussi</p>
    </header>
    <main>
        <h2>À propos</h2>
        <p>Ceci est un exemple de page HTML statique moderne, avec un peu de style pour la rendre agréable à lire.</p>
        <ul>
            <li>Simple à modifier</li>
            <li>Rapide à charger</li>
            <li>Idéale pour un projet de base</li>
        </ul>
    </main>
    <footer>
        &copy; 2026 - Exemple statique
    </footer>
</body>
</html>
